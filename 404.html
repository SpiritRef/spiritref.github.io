<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>迷失方向 - 鬼磕頭</title>

    <link rel="icon" href="https://spiritref.github.io/GhostKowtow.ico" type="image/x-icon">
    <link rel="shortcut icon" href="https://spiritref.github.io/GhostKowtow.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="https://spiritref.github.io/GhostKowtow.jpg">
    <style>
        body {
            background-color: #1a1a1a; /* 深色背景 */
            color: #eeeeee;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 20px;
            border: 1px solid #333;
            border-radius: 12px;
            background: #252525;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { font-size: 2rem; letter-spacing: 4px; color: #d4a373; }
        p { font-size: 1rem; color: #888; margin: 20px 0; }
        .countdown { color: #d4a373; font-weight: bold; }
        .link { color: #d4a373; text-decoration: none; border-bottom: 1px solid; }
    </style>
</head>
<body>
    <div class="container">
        <h1>此路不通</h1>
        <p>您似乎誤入了迷霧之中...<br>將在 <span id="timer" class="countdown">3</span> 秒後帶您回到人間。</p>
        <p><a href="https://spiritref.github.io/services/" class="link">直接返回官網首頁</a></p>
    </div>

    <script>
        let timeLeft = 3;
        const timerElement = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                // window.location.href = "https://spiritref.github.io/services/";
                window.location.replace("https://spiritref.github.io/services/");
            }
        }, 1000);
    </script>
</body>
</html>
