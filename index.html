<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- 1. Meta 標籤：讓瀏覽器在 0 秒內立即跳轉 -->
    <meta http-equiv="refresh" content="0; url=https://spiritref.github.io/services">
    <title>Redirecting...</title>
    <script>
        // 2. JavaScript：這是最快的方法，會直接替換當前網址
        window.location.replace("https://spiritref.github.io/services");
    </script>
</head>
<body>
    <!-- 這裡不放任何文字，使用者就不會看到任何東西 -->
</body>
</html>
